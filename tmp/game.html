<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>シンプルな移動ゲーム</title>
  <style>
    body { margin: 0; }
    canvas { background: #eee; display: block; margin: 0 auto; }
  </style>
</head>
<body>
<canvas id="gameCanvas" width="400" height="300"></canvas>
<script>
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  const rect = { x: 50, y: 50, size: 30, speed: 5 };
  const triangle = { x: 200, y: 100, size: 30 };
  const circle = { x: 300, y: 250, radius: 15 }; // 将来的に動かす用にオブジェクト保持
  const keys = {};
  let gameCleared = false;

  document.addEventListener('keydown', e => keys[e.key] = true);
  document.addEventListener('keyup', e => keys[e.key] = false);

  function update() {
    if (gameCleared) return;

    if (keys['ArrowUp']    && rect.y > 0) rect.y -= rect.speed;
    if (keys['ArrowDown']  && rect.y < canvas.height - rect.size) rect.y += rect.speed;
    if (keys['ArrowLeft']  && rect.x > 0) rect.x -= rect.speed;
    if (keys['ArrowRight'] && rect.x < canvas.width - rect.size) rect.x += rect.speed;

    checkCollision();
  }

  function drawTriangle() {
    const { x, y, size } = triangle;
    ctx.fillStyle = 'red';
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x - size / 2, y + size);
    ctx.lineTo(x + size / 2, y + size);
    ctx.closePath();
    ctx.fill();
  }

  function drawCircle() {
    const { x, y, radius } = circle;
    ctx.fillStyle = 'green';
    ctx.beginPath();
    ctx.arc(x, y, radius, 0, Math.PI * 2);
    ctx.fill();
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    drawTriangle();
    drawCircle();

    ctx.fillStyle = 'blue';
    ctx.fillRect(rect.x, rect.y, rect.size, rect.size);
  }

  function checkCollision() {
    const triCenterX = triangle.x;
    const triBottomY = triangle.y + triangle.size;

    const rectCenterX = rect.x + rect.size / 2;
    const rectTopY = rect.y;

    const xAligned = Math.abs(rectCenterX - triCenterX) < 1;
    const yAligned = Math.abs(rectTopY - triBottomY) < 1;

    if (xAligned && yAligned && !gameCleared) {
      gameCleared = true;
      setTimeout(() => alert("Game Clear!"), 10);
    }
  }

  function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
  }

  loop();
</script>
</body>
</html>
